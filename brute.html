<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaKilogram Login Simulator</title>
<style>
    body{
        margin:0;
        font-family:Arial, sans-serif;
        background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045);
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .container{
        background:white;
        padding:30px;
        border-radius:20px;
        width:360px;
        box-shadow:0 10px 30px rgba(0,0,0,0.3);
        text-align:center;
    }

    h1{
        font-family:cursive;
        color:#c13584;
        margin-bottom:20px;
    }

    input{
        width:90%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:10px;
        font-size:16px;
    }

    button{
        width:95%;
        padding:12px;
        margin-top:10px;
        border:none;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
        color:white;
    }

    .registerBtn{ background:#0095f6; }
    .hackBtn{ background:#111; }

    #log{
        margin-top:20px;
        background:#000;
        color:#00ff00;
        height:150px;
        overflow-y:auto;
        padding:10px;
        font-family:monospace;
        font-size:14px;
        border-radius:10px;
        text-align:left;
    }

    #result{
        margin-top:15px;
        font-weight:bold;
        color:green;
    }
</style>
</head>
<body>

<div class="container">
    <h1>InstaKilogram</h1>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" maxlength="4" placeholder="4 Digit Password">

    <button class="registerBtn" onclick="registerLogin()">Register</button>

    <button class="hackBtn" onclick="unlockAndBruteForce()">Unlock Brute Force</button>

    <input type="password" id="masterPassword" maxlength="4" placeholder="Brute Force Password">

    <div id="result"></div>
    <div id="log"></div>
</div>

<script>
let savedUsername = "";
let savedPassword = "";

function registerLogin(){
    savedUsername = document.getElementById("username").value;
    savedPassword = document.getElementById("password").value;

    if(savedPassword.length !== 4 || isNaN(savedPassword)){
        alert("Password must be exactly 4 digits!");
        return;
    }

    document.getElementById("result").innerHTML = "Registered Successfully!";
    document.getElementById("log").innerHTML = "";
}

function unlockAndBruteForce(){
    if(savedPassword === ""){
        alert("Register first!");
        return;
    }

    let masterCode = document.getElementById("masterPassword").value;

    if(masterCode === "1514"){
        bruteForce();
    } else {
        alert("Incorrect Brute Force Password!");
    }
}

function bruteForce(){
    const log = document.getElementById("log");
    const result = document.getElementById("result");

    log.innerHTML = "";
    result.innerHTML = "Brute force started...";

    let startTime = performance.now();
    let i = 0;

    let interval = setInterval(() => {
        let attempt = i.toString().padStart(4, '0');

        log.innerHTML += "Trying Password: " + attempt + "<br>";
        log.scrollTop = log.scrollHeight;

        if(attempt === savedPassword){
            let endTime = performance.now();
            let timeTaken = ((endTime - startTime)/1000).toFixed(2);

            clearInterval(interval);

            result.innerHTML = `
                ✅ LOGIN SUCCESS!<br>
                Password Found: <b>${attempt}</b><br>
                Attempts: <b>${i+1}</b><br>
                Time Taken: <b>${timeTaken} sec</b>
            `;
        }

        i++;

        if(i > 9999){
            clearInterval(interval);
            result.innerHTML = "Password Not Found";
        }

    }, 5);
}
</script>

</body>
</html>

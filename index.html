<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravi's Simulations Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#74ebd5,#ACB6E5);
    min-height:100vh;
    color:#222;
}

/* PIN LOCK SCREEN */
#pinOverlay{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.pin-box{
    background:rgba(255,255,255,0.08);
    padding:40px;
    border-radius:25px;
    text-align:center;
    color:white;
    width:340px;
    backdrop-filter:blur(12px);
    box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.pin-box h2{
    margin-bottom:20px;
}

.pin-box input{
    width:100%;
    padding:15px;
    font-size:22px;
    text-align:center;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    outline:none;
}

.pin-box button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
}

#errorText{
    margin-top:12px;
    color:#f87171;
    font-size:14px;
}

header{
    text-align:center;
    padding:30px 20px;
    color:white;
    position:relative;
}

header h1{
    font-size:2.5rem;
    font-weight:700;
}

header p{
    margin-top:10px;
    font-size:1.1rem;
}

.floating{
    position:absolute;
    font-size:2rem;
    animation:float 4s ease-in-out infinite;
}

.f1{top:20px; left:10%;}
.f2{top:50px; right:12%;}
.f3{top:90px; left:20%;}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

.search-box{
    max-width:550px;
    margin:20px auto;
    text-align:center;
}

.search-box input{
    width:90%;
    padding:15px 20px;
    border:none;
    border-radius:50px;
    font-size:16px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    outline:none;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    padding:30px;
    max-width:1300px;
    margin:auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:25px;
    box-shadow:0 12px 30px rgba(0,0,0,0.12);
    cursor:pointer;
    transition:0.35s ease;
    position:relative;
    overflow:hidden;
}

.card::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:6px;
    background:linear-gradient(90deg,#ff758c,#ff7eb3);
}

.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 20px 40px rgba(0,0,0,0.18);
}

.card h3{
    color:#4f46e5;
    margin-bottom:10px;
    font-size:1.2rem;
}

.card p{
    color:#555;
    font-size:14px;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    z-index:1000;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.modal-content{
    width:95%;
    height:90%;
    background:white;
    border-radius:20px;
    overflow:hidden;
    position:relative;
}

.close{
    position:absolute;
    top:12px;
    right:20px;
    font-size:32px;
    font-weight:bold;
    cursor:pointer;
    z-index:10;
}

iframe{
    width:100%;
    height:100%;
    border:none;
}

footer{
    text-align:center;
    padding:25px;
    color:white;
    font-size:14px;
}
</style>
</head>
<body>

<!-- PIN LOCK -->
<div id="pinOverlay">
    <div class="pin-box">
        <h2>🔒 Enter 4 Digit PIN</h2>
        <input type="password" id="sitePin" maxlength="4" placeholder="****">
        <button onclick="unlockSite()">Unlock Website</button>
        <div id="errorText"></div>
    </div>
</div>

<header>
    <div class="floating f1">⚡</div>
    <div class="floating f2">🧪</div>
    <div class="floating f3">🚀</div>

    <h1>🎓 Simulations Lab</h1>
    <p>Learn Science & Math Through Fun Interactive Experiments!</p>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Search simulations...">
</div>

<div class="grid" id="simGrid">
    <div class="card" onclick="window.open('brute.html','_blank')">
        <h3>BRUTE FORCE</h3>
        <p>LOCKED!</p>
    </div>
</div>

<div class="modal" id="simModal">
    <div class="modal-content">
        <span class="close" onclick="closeSim()">&times;</span>
        <iframe id="simFrame"></iframe>
    </div>
</div>

<footer>
    Built by Ravi 2194062, University of Delhi 2025
</footer>

<script>
function unlockSite(){
    const pin = document.getElementById("sitePin").value;

    if(pin === "1514"){
        document.getElementById("pinOverlay").style.display = "none";
    }else{
        document.getElementById("errorText").innerText = "Incorrect PIN!";
    }
}

function openSim(url){
    document.getElementById('simFrame').src = url;
    document.getElementById('simModal').style.display = 'flex';
}

function closeSim(){
    document.getElementById('simModal').style.display = 'none';
    document.getElementById('simFrame').src = '';
}

document.getElementById('searchInput').addEventListener('keyup', function(){
    let filter = this.value.toLowerCase();
    let cards = document.querySelectorAll('.card');

    cards.forEach(card=>{
        let text = card.innerText.toLowerCase();
        card.style.display = text.includes(filter) ? 'block' : 'none';
    });
});
</script>

</body>
</html>

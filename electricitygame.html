<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Circuit Game</title>

<style>
body{
    margin:0;
    font-family:'Comic Sans MS', cursive;
    background:linear-gradient(135deg,#b3ecff,#d9b3ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:15px;
}
.game-container{
    background:#fff;
    width:100%;
    max-width:950px;
    border-radius:25px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}
h1{color:#6a00ff;}
.instructions{
    background:#f2ebff;
    padding:12px;
    border-radius:15px;
    margin-bottom:20px;
}

.circuit-board{
    position:relative;
    width:100%;
    max-width:850px;
    height:420px;
    margin:auto;
    background:#eef8ff;
    border:4px dashed #9dd0ff;
    border-radius:20px;
    overflow:hidden;
}

/* CIRCUIT WIRES */
.circuit-wire{
    position:absolute;
    background:#888;
    border-radius:10px;
    opacity:0.35;
    transition:0.4s ease;
    z-index:1;
}
.circuit-wire.horizontal{
    height:6px;
}
.circuit-wire.vertical{
    width:6px;
}
.circuit-wire.active{
    background:#ff2d2d;
    opacity:1;
    box-shadow:
        0 0 8px #ff2d2d,
        0 0 18px #ff2d2d,
        0 0 28px rgba(255,0,0,0.6);
}

/* SLOTS */
.slot{
    position:absolute;
    width:90px;
    height:90px;
    border:3px dashed #999;
    border-radius:18px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:#666;
    z-index:2;
}

/* PARTS */
.parts{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}
.part{
    width:90px;
    height:90px;
    background:white;
    border:3px solid #ddd;
    border-radius:20px;
    font-size:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.25s;
    user-select:none;
}
.part.selected{
    border-color:#6a00ff;
    transform:scale(1.1);
    box-shadow:0 0 15px rgba(106,0,255,0.4);
}

/* BULB GLOW */
.glow{
    animation:superGlow 0.7s infinite alternate ease-in-out;
}
@keyframes superGlow{
    from{
        transform:scale(1);
        filter:
            drop-shadow(0 0 10px yellow)
            drop-shadow(0 0 20px gold);
    }
    to{
        transform:scale(1.2) rotate(2deg);
        filter:
            drop-shadow(0 0 25px yellow)
            drop-shadow(0 0 45px gold)
            drop-shadow(0 0 65px orange);
    }
}

/* BUTTONS */
button{
    background:#6a00ff;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:14px;
    margin:8px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#5200cc;
}

.message{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
    min-height:30px;
}
</style>
</head>
<body>

<div class="game-container">
    <h1>⚡ Electric Circuit Game ⚡</h1>

    <div class="instructions">
        Tap a part, then tap its correct place.<br>
        Complete the circuit to make the bulb glow!
    </div>

    <div class="circuit-board" id="board">

        <!-- GLOWING CIRCUIT WIRES -->
        <div class="circuit-wire horizontal" style="top:82px; left:130px; width:570px;"></div>
        <div class="circuit-wire vertical" style="top:130px; right:82px; height:190px;"></div>
        <div class="circuit-wire horizontal" style="bottom:82px; left:130px; width:570px;"></div>
        <div class="circuit-wire vertical" style="top:130px; left:82px; height:190px;"></div>

        <!-- COMPONENT SLOTS -->
        <div class="slot" data-correct="battery" style="top:40px; left:40px;">Battery</div>
        <div class="slot" data-correct="wire1" style="top:40px; right:40px;">Wire</div>
        <div class="slot" data-correct="bulb" style="bottom:40px; right:40px;">Bulb</div>
        <div class="slot" data-correct="switch" style="bottom:40px; left:40px;">Switch</div>
    </div>

    <div class="parts">
        <div class="part" data-part="battery">🔋</div>
        <div class="part" data-part="wire1">〰️</div>
        <div class="part" data-part="bulb">💡</div>
        <div class="part" data-part="switch">🎚️</div>
    </div>

    <div>
        <button onclick="checkCircuit()">Check Circuit</button>
        <button onclick="resetGame()">Reset</button>
    </div>

    <div class="message" id="message"></div>
</div>

<script>
let selectedPart = null;

/* SELECT PART */
document.querySelectorAll('.part').forEach(part=>{
    part.addEventListener('click',()=>{
        document.querySelectorAll('.part').forEach(p=>p.classList.remove('selected'));
        selectedPart = part;
        part.classList.add('selected');
    });
});

/* PLACE PART */
document.querySelectorAll('.slot').forEach(slot=>{
    slot.addEventListener('click',()=>{
        if(!selectedPart) return;
        if(slot.querySelector('.part')) return;

        slot.innerHTML='';
        slot.appendChild(selectedPart);

        selectedPart.classList.remove('selected');
        selectedPart=null;
    });
});

/* CHECK CIRCUIT */
function checkCircuit(){
    let correct=true;

    document.querySelectorAll('.slot').forEach(slot=>{
        const placed=slot.querySelector('.part');
        if(!placed || placed.dataset.part!==slot.dataset.correct){
            correct=false;
        }
    });

    const msg=document.getElementById('message');

    if(correct){
        msg.style.color='green';
        msg.innerHTML='🎉 Great Job! Circuit Complete!';
        activateCircuit();
        playSuccessSound();
    }else{
        msg.style.color='red';
        msg.innerHTML='❌ Complete the loop to let electricity flow!';
        deactivateCircuit();
    }
}

/* ACTIVATE CIRCUIT */
function activateCircuit(){
    deactivateCircuit();

    const bulb=document.querySelector('[data-correct="bulb"] .part');

    if(bulb){
        bulb.classList.add('glow');
        bulb.innerHTML='💡✨';
    }

    document.querySelectorAll('.circuit-wire').forEach(wire=>{
        wire.classList.add('active');
    });
}

/* DEACTIVATE */
function deactivateCircuit(){
    document.querySelectorAll('.circuit-wire').forEach(wire=>{
        wire.classList.remove('active');
    });

    const bulb=document.querySelector('[data-correct="bulb"] .part');

    if(bulb){
        bulb.classList.remove('glow');
        bulb.innerHTML='💡';
    }
}

/* SOUND */
function playSuccessSound(){
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    osc.frequency.value=650;
    osc.type='triangle';
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime+0.25);
}

/* RESET */
function resetGame(){
    deactivateCircuit();

    document.getElementById('message').innerHTML='';

    const partsBox=document.querySelector('.parts');

    document.querySelectorAll('.slot').forEach(slot=>{
        const part=slot.querySelector('.part');
        if(part){
            partsBox.appendChild(part);
            slot.innerHTML=slot.dataset.correct.replace('1','');
        }
    });

    selectedPart=null;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electric Circuit Game </title>

<style>
body{
    margin:0;
    font-family:'Comic Sans MS', cursive;
    background:linear-gradient(135deg,#b3ecff,#d9b3ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:15px;
}
.game-container{
    background:#fff;
    width:100%;
    max-width:950px;
    border-radius:25px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}
h1{color:#6a00ff;}
.instructions{
    background:#f2ebff;
    padding:12px;
    border-radius:15px;
    margin-bottom:20px;
}

.circuit-board{
    position:relative;
    width:100%;
    max-width:850px;
    height:420px;
    margin:auto;
    background:#eef8ff;
    border:4px dashed #9dd0ff;
    border-radius:20px;
    overflow:hidden;
}

/* SLOTS */
.slot{
    position:absolute;
    width:90px;
    height:90px;
    border:3px dashed #999;
    border-radius:18px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    color:#666;
}

/* PARTS */
.parts{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}
.part{
    width:90px;
    height:90px;
    background:white;
    border:3px solid #ddd;
    border-radius:20px;
    font-size:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.25s;
}
.part.selected{
    border-color:#6a00ff;
    transform:scale(1.1);
    box-shadow:0 0 15px rgba(106,0,255,0.4);
}

/* BULB GLOW */
.glow{
    animation:superGlow 0.7s infinite alternate ease-in-out;
}
@keyframes superGlow{
    from{
        transform:scale(1);
        filter:
            drop-shadow(0 0 10px yellow)
            drop-shadow(0 0 20px gold);
    }
    to{
        transform:scale(1.2) rotate(2deg);
        filter:
            drop-shadow(0 0 25px yellow)
            drop-shadow(0 0 45px gold)
            drop-shadow(0 0 65px orange);
    }
}

/* CURRENT FLOW DOTS */
.current-dot{
    position:absolute;
    width:16px;
    height:16px;
    background:#00e5ff;
    border-radius:50%;
    box-shadow:0 0 12px #00e5ff;
}

/* Buttons */
button{
    background:#6a00ff;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:14px;
    margin:8px;
    font-size:16px;
    cursor:pointer;
}

.message{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
    min-height:30px;
}
</style>
</head>
<body>

<div class="game-container">
    <h1>⚡ Electric Circuit Game ⚡</h1>

    <div class="instructions">
        Tap a part, then tap its correct place.<br>
        Watch the current flow when the circuit is complete!
    </div>

    <div class="circuit-board" id="board">
        <div class="slot" data-correct="battery" style="top:40px; left:40px;">Battery</div>
        <div class="slot" data-correct="wire1" style="top:40px; right:40px;">Wire</div>
        <div class="slot" data-correct="bulb" style="bottom:40px; right:40px;">Bulb</div>
        <div class="slot" data-correct="switch" style="bottom:40px; left:40px;">Switch</div>
    </div>

    <div class="parts">
        <div class="part" data-part="battery">🔋</div>
        <div class="part" data-part="wire1">〰️</div>
        <div class="part" data-part="bulb">💡</div>
        <div class="part" data-part="switch">🎚️</div>
    </div>

    <div>
        <button onclick="checkCircuit()">Check Circuit</button>
        <button onclick="resetGame()">Reset</button>
    </div>

    <div class="message" id="message"></div>
</div>

<script>
let selectedPart = null;
let currentInterval;

/* SELECT PART */
document.querySelectorAll('.part').forEach(part=>{
    part.addEventListener('click',()=>{
        document.querySelectorAll('.part').forEach(p=>p.classList.remove('selected'));
        selectedPart = part;
        part.classList.add('selected');
    });
});

/* PLACE PART */
document.querySelectorAll('.slot').forEach(slot=>{
    slot.addEventListener('click',()=>{
        if(!selectedPart) return;
        if(slot.querySelector('.part')) return;

        slot.innerHTML='';
        slot.appendChild(selectedPart);

        selectedPart.classList.remove('selected');
        selectedPart=null;
    });
});

/* CHECK CIRCUIT */
function checkCircuit(){
    let correct=true;

    document.querySelectorAll('.slot').forEach(slot=>{
        const placed=slot.querySelector('.part');
        if(!placed || placed.dataset.part!==slot.dataset.correct){
            correct=false;
        }
    });

    const msg=document.getElementById('message');

    if(correct){
        msg.style.color='green';
        msg.innerHTML='🎉 Great Job! Current is Flowing!';
        activateCircuit();
        playSuccessSound();
    }else{
        msg.style.color='red';
        msg.innerHTML='❌ Complete the loop to let current flow!';
        deactivateCircuit();
    }
}

/* ACTIVATE CIRCUIT */
function activateCircuit(){
    deactivateCircuit();

    const bulb=document.querySelector('[data-correct="bulb"] .part');
    if(bulb){
        bulb.classList.add('glow');
        bulb.innerHTML='💡✨';
    }

    animateCurrentFlow();
}

/* CURRENT FLOW ANIMATION */
function animateCurrentFlow(){
    const board=document.getElementById('board');

    const path = [
        [85,85],
        [700,85],
        [700,320],
        [85,320],
        [85,85]
    ];

    let dot=document.createElement('div');
    dot.className='current-dot';
    board.appendChild(dot);

    let segment=0;
    let progress=0;

    currentInterval=setInterval(()=>{
        let start=path[segment];
        let end=path[segment+1];

        progress += 0.03;

        if(progress>=1){
            progress=0;
            segment++;
            if(segment>=path.length-1) segment=0;
            start=path[segment];
            end=path[segment+1];
        }

        let x=start[0]+(end[0]-start[0])*progress;
        let y=start[1]+(end[1]-start[1])*progress;

        dot.style.left=x+'px';
        dot.style.top=y+'px';

    },20);
}

/* DEACTIVATE */
function deactivateCircuit(){
    clearInterval(currentInterval);

    document.querySelectorAll('.current-dot').forEach(d=>d.remove());

    const bulb=document.querySelector('[data-correct="bulb"] .part');
    if(bulb){
        bulb.classList.remove('glow');
        bulb.innerHTML='💡';
    }
}

/* SOUND */
function playSuccessSound(){
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();
    osc.frequency.value=650;
    osc.type='triangle';
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime+0.25);
}

/* RESET */
function resetGame(){
    deactivateCircuit();

    document.getElementById('message').innerHTML='';

    const partsBox=document.querySelector('.parts');

    document.querySelectorAll('.slot').forEach(slot=>{
        const part=slot.querySelector('.part');
        if(part){
            partsBox.appendChild(part);
            slot.innerHTML=slot.dataset.correct.replace('1','');
        }
    });

    selectedPart=null;
}
</script>

</body>
</html>

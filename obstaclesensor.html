<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obstacle Sensor Circuit Game</title>

<style>
/* =========================
   PAGE
========================= */
body{
    margin:0;
    font-family:'Comic Sans MS', cursive;
    background:linear-gradient(135deg,#c9f2ff,#ead1ff);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:15px;
}
.game-container{
    background:#fff;
    width:100%;
    max-width:1150px;
    border-radius:25px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
    text-align:center;
}
h1{color:#6a00ff;}
.instructions{
    background:#f5edff;
    padding:12px;
    border-radius:15px;
    margin-bottom:18px;
}

/* =========================
   BOARD
========================= */
.circuit-board{
    position:relative;
    width:100%;
    max-width:980px;
    height:540px;
    margin:auto;
    background:#eef8ff;
    border:4px dashed #9ed0ff;
    border-radius:20px;
    overflow:hidden;
}

/* WIRING */
.wire-path{
    position:absolute;
    background:#555;
    border-radius:10px;
    opacity:.25;
    transition:.3s;
}
.wire-horizontal{height:12px;}
.wire-vertical{width:12px;}

/* ACTIVE CURRENT GLOW */
.wire-path.active{
    background:#00e5ff;
    box-shadow:
        0 0 10px #00e5ff,
        0 0 20px #00e5ff,
        0 0 35px #00e5ff;
    opacity:1;
}

/* SLOTS */
.slot{
    position:absolute;
    width:120px;
    height:120px;
    border:3px dashed #999;
    border-radius:20px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:15px;
    color:#666;
    z-index:2;
}

/* PARTS */
.parts{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    margin-top:20px;
}
.part{
    width:120px;
    height:120px;
    border-radius:20px;
    border:3px solid #ddd;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    cursor:pointer;
    transition:.25s;
    user-select:none;
}
.part.selected{
    border-color:#6a00ff;
    transform:scale(1.08);
    box-shadow:0 0 15px rgba(106,0,255,.35);
}

.sensor-part img{
    width:85%;
    height:85%;
    object-fit:contain;
    pointer-events:none;
}

/* HAND ICON */
.obstacle-icon{
    position:absolute;
    top:210px;
    right:150px;
    width:90px;
    height:90px;
    border-radius:50%;
    background:#fff;
    border:4px solid #6a00ff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    cursor:pointer;
    z-index:10;
    transition:.3s;
}
.obstacle-icon.active{
    transform:scale(1.1);
    background:#fff3cd;
}

/* RADIO WAVES */
.wave{
    position:absolute;
    width:0;
    height:6px;
    background:#ff4d4d;
    top:250px;
    right:250px;
    border-radius:10px;
    transform-origin:right center;
    opacity:0;
    z-index:8;
}
.wave.active{
    animation:waveMove 1s infinite;
}

@keyframes waveMove{
    0%{
        width:0;
        opacity:0;
    }
    25%{
        width:70px;
        opacity:1;
    }
    50%{
        width:140px;
        opacity:1;
    }
    75%{
        width:70px;
        opacity:1;
        background:#00c853;
    }
    100%{
        width:0;
        opacity:0;
    }
}

/* BULB */
.glow{
    animation:bulbGlow .7s infinite alternate ease-in-out;
}
@keyframes bulbGlow{
    from{
        transform:scale(1);
        filter:drop-shadow(0 0 10px yellow);
    }
    to{
        transform:scale(1.2);
        filter:
            drop-shadow(0 0 25px yellow)
            drop-shadow(0 0 50px orange);
    }
}

/* BUTTONS */
button{
    background:#6a00ff;
    color:#fff;
    border:none;
    padding:14px 22px;
    font-size:17px;
    border-radius:14px;
    margin:10px;
    cursor:pointer;
}
button:hover{background:#5200cc;}

.message{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
    min-height:30px;
}
</style>
</head>
<body>

<div class="game-container">
    <h1>🚧 Obstacle Sensor Circuit Game</h1>

    <div class="instructions">
        Build the circuit, then touch the hand icon to place obstacle.<br>
        Watch the sensor send and receive waves!
    </div>

    <div class="circuit-board" id="board">

        <!-- WIRES -->
        <div class="wire-path wire-horizontal" style="top:100px; left:155px; width:660px;"></div>
        <div class="wire-path wire-vertical" style="top:155px; right:100px; height:220px;"></div>
        <div class="wire-path wire-horizontal" style="bottom:100px; left:155px; width:660px;"></div>
        <div class="wire-path wire-vertical" style="top:155px; left:100px; height:220px;"></div>

        <!-- COMPONENT SLOTS -->
        <div class="slot" data-correct="battery" style="top:40px; left:40px;">Battery</div>
        <div class="slot" data-correct="sensor" style="top:40px; right:40px;">Sensor</div>
        <div class="slot" data-correct="bulb" style="bottom:40px; right:40px;">Bulb</div>
        <div class="slot" data-correct="wire" style="bottom:40px; left:40px;">Wire</div>

        <!-- RADIO WAVE -->
        <div class="wave" id="wave"></div>

        <!-- HAND ICON -->
        <div class="obstacle-icon" id="obstacleIcon">✋</div>
    </div>

    <!-- PARTS -->
    <div class="parts">
        <div class="part" data-part="battery">🔋</div>

        <div class="part sensor-part" data-part="sensor">
            <img src="obstacle-sensor.png" alt="Obstacle Sensor">
        </div>

        <div class="part" data-part="bulb">💡</div>
        <div class="part" data-part="wire">〰️</div>
    </div>

    <div>
        <button onclick="checkCircuit()">Check Circuit</button>
        <button onclick="resetGame()">Reset</button>
    </div>

    <div class="message" id="message"></div>
</div>

<script>
let selectedPart=null;
let circuitReady=false;

/* SELECT PART */
document.querySelectorAll('.part').forEach(part=>{
    part.addEventListener('click',()=>{
        document.querySelectorAll('.part').forEach(p=>p.classList.remove('selected'));
        selectedPart=part;
        part.classList.add('selected');
    });
});

/* PLACE PART */
document.querySelectorAll('.slot').forEach(slot=>{
    slot.addEventListener('click',()=>{
        if(!selectedPart) return;
        if(slot.querySelector('.part')) return;

        slot.innerHTML='';
        slot.appendChild(selectedPart);

        selectedPart.classList.remove('selected');
        selectedPart=null;
    });
});

/* CHECK CIRCUIT */
function checkCircuit(){
    circuitReady=true;

    document.querySelectorAll('.slot').forEach(slot=>{
        const placed=slot.querySelector('.part');
        if(!placed || placed.dataset.part!==slot.dataset.correct){
            circuitReady=false;
        }
    });

    const msg=document.getElementById('message');

    if(circuitReady){
        msg.style.color='green';
        msg.innerHTML='✅ Circuit Complete! Touch the hand icon.';
    }else{
        msg.style.color='red';
        msg.innerHTML='❌ Complete the circuit first.';
        deactivateCircuit();
    }
}

/* HAND TOUCH */
const obstacle=document.getElementById('obstacleIcon');

obstacle.addEventListener('touchstart',activateObstacle);
obstacle.addEventListener('mousedown',activateObstacle);

obstacle.addEventListener('touchend',deactivateObstacle);
obstacle.addEventListener('mouseup',deactivateObstacle);
obstacle.addEventListener('mouseleave',deactivateObstacle);

function activateObstacle(e){
    e.preventDefault();

    obstacle.classList.add('active');

    if(circuitReady){
        activateCircuit();
    }
}

function deactivateObstacle(){
    obstacle.classList.remove('active');
    deactivateCircuit();
}

/* ACTIVATE CIRCUIT */
function activateCircuit(){
    const bulb=document.querySelector('[data-correct="bulb"] .part');
    const wave=document.getElementById('wave');

    if(bulb){
        bulb.classList.add('glow');
        bulb.innerHTML='💡✨';
    }

    document.querySelectorAll('.wire-path').forEach(w=>w.classList.add('active'));

    wave.classList.add('active');

    document.getElementById('message').innerHTML=
        '🎉 Obstacle Detected! Sensor reflected wave and bulb glows!';
}

/* DEACTIVATE */
function deactivateCircuit(){
    const bulb=document.querySelector('[data-correct="bulb"] .part');
    const wave=document.getElementById('wave');

    if(bulb){
        bulb.classList.remove('glow');
        bulb.innerHTML='💡';
    }

    document.querySelectorAll('.wire-path').forEach(w=>w.classList.remove('active'));

    wave.classList.remove('active');
}

/* RESET */
function resetGame(){
    deactivateCircuit();

    selectedPart=null;
    circuitReady=false;

    obstacle.classList.remove('active');

    document.getElementById('message').innerHTML='';

    const partsBox=document.querySelector('.parts');

    document.querySelectorAll('.slot').forEach(slot=>{
        const part=slot.querySelector('.part');

        if(part){
            partsBox.appendChild(part);
            slot.innerHTML=
                slot.dataset.correct.charAt(0).toUpperCase()+
                slot.dataset.correct.slice(1);
        }
    });
}
</script>

</body>
</html>
